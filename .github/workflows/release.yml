# Publishes @scrapkit/engineering-kit to npm when a version tag is pushed.
# The Composer side needs no workflow: Packagist picks the tag up from GitHub.
# Auth uses npm trusted publishing (OIDC): the package on npmjs.com must have
# a trusted publisher configured for Scrapkit/engineering-kit + release.yml.
# No npm token secret is needed.
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing needs npm >= 11.5.1; Node 22 bundles npm 10.
      - run: npm install -g npm@latest
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag v$TAG does not match package.json version $VERSION" >&2
            exit 1
          fi
      - run: npm publish --access public --provenance
