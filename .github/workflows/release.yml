# Publishes @scrapkit/engineering-kit to npm when a version tag is pushed.
# The Composer side needs no workflow, but Packagist only picks tags up once the
# package has been submitted there a first time — see issue #4.
# Auth uses npm trusted publishing (OIDC): the package on npmjs.com must have
# a trusted publisher configured for Scrapkit/engineering-kit + release.yml.
# No npm token secret is needed.
name: Release

on:
  push:
    tags:
      - "v*"
  # Republish a tag whose run failed, without moving the tag. Pick the tag as
  # the ref when dispatching.
  workflow_dispatch:

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Trusted publishing needs npm >= 11.5.1. Node 24 bundles npm 11, so
          # take it from the runtime: `npm install -g npm@latest` prunes the
          # running npm's own dependencies mid-upgrade, and publishing then
          # dies on a missing `sigstore`.
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - name: Verify npm is new enough for trusted publishing
        run: |
          HAVE="$(npm --version)"
          WANT=11.5.1
          if [ "$(printf '%s\n%s\n' "$WANT" "$HAVE" | sort -V | head -1)" != "$WANT" ]; then
            echo "npm $HAVE is older than $WANT; trusted publishing will fail" >&2
            exit 1
          fi
          echo "npm $HAVE"
      # Both manifests, not just npm's: Claude Code delivers a plugin update
      # only when the plugin manifest's version changes, so a tag that skips
      # that bump silently strands everyone who installed the plugin.
      - name: Verify tag matches manifest versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          FAIL=0
          for MANIFEST in package.json plugins/engineering-kit/.claude-plugin/plugin.json; do
            VERSION="$(node -p "require('./$MANIFEST').version")"
            if [ "$TAG" != "$VERSION" ]; then
              echo "Tag v$TAG does not match $MANIFEST version $VERSION" >&2
              FAIL=1
            fi
          done
          exit $FAIL
      - run: npm publish --access public --provenance
